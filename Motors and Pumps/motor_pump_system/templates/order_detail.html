<!DOCTYPE html><html lang="en"><head>    <meta charset="UTF-8">    <meta name="viewport" content="width=device-width, initial-scale=1.0">    <title>Order Tracking — MotoParts</title>    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">    <link rel="stylesheet" href="static/css/style.css"></head><body>    <nav class="navbar navbar-expand-lg sticky-top">        <div class="container">            <a class="navbar-brand" href="/"><i class="fas fa-cogs"></i> Moto<span style="color: var(--accent-amber);">Parts</span></a>            <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"><i class="fas fa-bars"></i></button>            <div class="collapse navbar-collapse" id="navbarNav">                <ul class="navbar-nav mx-auto">                    <li class="nav-item"><a class="nav-link" href="/"><i class="fas fa-home"></i> Home</a></li>                    <li class="nav-item"><a class="nav-link" href="/products"><i class="fas fa-box"></i> Products</a></li>                    <li class="nav-item"><a class="nav-link" href="/dashboard"><i class="fas fa-tachometer-alt"></i> Dashboard</a></li>                    <li class="nav-item"><a class="nav-link active" href="/dashboard"><i class="fas fa-receipt"></i> My Orders</a></li>                </ul>                <div class="d-flex align-items-center gap-2">                    <a href="/cart" class="btn btn-outline position-relative" style="padding:6px 12px"><i class="fas fa-shopping-cart"></i> <span class="cart-badge" style="display:none">0</span></a>                    <a href="#" class="btn btn-gold" style="font-size:0.78rem">Login</a>                </div>            </div>        </div>    </nav>    <div class="container py-4">        <nav aria-label="breadcrumb" class="mb-3"><ol class="breadcrumb"><li class="breadcrumb-item"><a href="/">Home</a></li><li class="breadcrumb-item"><a href="/dashboard">Dashboard</a></li><li class="breadcrumb-item active" id="breadcrumbOrder">Order</li></ol></nav>        <div class="row g-4">            <div class="col-lg-8" id="orderContent"></div>            <div class="col-lg-4" id="trackingSidebar"></div>        </div>    </div>    <footer style="background:#101018;border-top:1px solid var(--border-color);padding:30px 0;margin-top:40px"><div class="container text-center"><p style="color:var(--text-tertiary);font-size:0.8rem;margin:0">&copy; 2026 MotoParts. All rights reserved.</p></div></footer>    <script src="static/js/main.js"></script>    <script>    var STATUS_ORDER = ['pending','confirmed','processing','shipped','delivered'];    var STATUS_LABELS = { pending:'Order Placed', confirmed:'Order Confirmed', processing:'Processing', shipped:'Shipped', delivered:'Delivered', cancelled:'Cancelled' };    document.addEventListener('DOMContentLoaded', function() {        var params = new URLSearchParams(window.location.search);        var id = parseInt(params.get('id'), 10);        var order = MotoStore.getOrderById(id);        if (!order) { document.getElementById('orderContent').innerHTML = '<div class="empty-state"><i class="fas fa-exclamation-triangle"></i><h4>Order not found</h4><a href="/dashboard" class="btn btn-primary mt-3">Go to Dashboard</a></div>'; return; }        document.title = 'Order #' + order.id + ' — MotoParts';        document.getElementById('breadcrumbOrder').textContent = 'Order #' + order.id;        var productRows = order.items.map(function(it) {            return '<div class="d-flex justify-content-between align-items-center py-2" style="border-bottom:1px solid var(--border-color)"><div><span style="font-weight:500;font-size:0.9rem">' + it.name + '</span><br><small style="color:var(--text-tertiary)">' + it.part + ' \u00D7 ' + it.qty + '</small></div><span style="font-weight:600">' + MotoStore.formatINR(it.subtotal) + '</span></div>';        }).join('');        document.getElementById('orderContent').innerHTML = '<div class="card mb-4"><div class="card-header d-flex justify-content-between align-items-center"><h5 class="mb-0"><i class="fas fa-receipt me-2" style="color:var(--accent-amber)"></i>Order #ORD-' + order.id + '</h5><span class="order-status status-' + order.status + '" style="display:inline-flex;align-items:center;padding:5px 14px;border-radius:20px;font-size:0.72rem;font-weight:600;background:rgba(212,168,83,0.12);color:var(--accent-amber)">' + STATUS_LABELS[order.status] + '</span></div><div class="card-body"><div class="row mb-3"><div class="col-md-6"><p style="color:var(--text-secondary);font-size:0.85rem;margin-bottom:6px"><strong style="color:var(--text-primary)">Order Date:</strong> ' + MotoStore.formatDate(order.date) + '</p><p style="color:var(--text-secondary);font-size:0.85rem;margin-bottom:6px"><strong style="color:var(--text-primary)">Payment:</strong> Cash on Delivery</p><p style="color:var(--text-secondary);font-size:0.85rem;margin-bottom:0"><strong style="color:var(--text-primary)">Phone:</strong> ' + (order.phone || '\u2014') + '</p></div><div class="col-md-6"><p style="color:var(--text-secondary);font-size:0.85rem;margin-bottom:6px"><strong style="color:var(--text-primary)">Delivery Address:</strong></p><p style="font-size:0.85rem;margin-bottom:0">' + (order.address || '\u2014') + '</p></div></div><h6 style="font-weight:600;margin-bottom:12px">Products</h6>' + productRows + '<div class="d-flex justify-content-between mt-3 pt-2" style="border-top:2px solid var(--border-color)"><span style="font-weight:700;font-size:1.1rem">Total</span><span style="color:var(--accent-amber);font-weight:700;font-size:1.1rem">' + MotoStore.formatINR(order.total) + '</span></div></div></div>';        var currentIdx = STATUS_ORDER.indexOf(order.status);        if (order.status === 'cancelled') {            document.getElementById('trackingSidebar').innerHTML = '<div class="card"><div class="card-header"><h5 class="mb-0"><i class="fas fa-truck me-2" style="color:var(--accent-amber)"></i>Order Status</h5></div><div class="card-body text-center" style="padding:40px"><i class="fas fa-times-circle fa-3x" style="color:#ff453a;margin-bottom:16px"></i><h5 style="font-weight:600;color:#ff453a">Cancelled</h5><p style="color:var(--text-secondary);font-size:0.85rem;margin-top:8px">This order has been cancelled</p></div></div>';        } else {            var timeline = STATUS_ORDER.map(function(s, i) {                var completed = i <= currentIdx;                var cls = completed ? 'completed' : '';                return '<div class="timeline-item ' + cls + '"><div class="timeline-icon"></div><div><span style="font-weight:600;font-size:0.85rem;color:' + (completed ? 'var(--text-primary)' : 'var(--text-tertiary)') + '">' + STATUS_LABELS[s] + '</span></div></div>';            }).join('');            document.getElementById('trackingSidebar').innerHTML = '<div class="card"><div class="card-header"><h5 class="mb-0"><i class="fas fa-truck me-2" style="color:var(--accent-amber)"></i>Tracking Timeline</h5></div><div class="card-body">' + timeline + (order.tracking ? '<div class="mt-3 p-3" style="background:rgba(52,199,89,0.08);border:1px solid rgba(52,199,89,0.2);border-radius:var(--radius-sm)"><small style="color:var(--text-tertiary)">Tracking Number</small><p style="font-weight:700;color:#34c759;margin:4px 0 0">' + order.tracking + '</p></div>' : '') + '</div></div>';        }    });    </script></body></html>
