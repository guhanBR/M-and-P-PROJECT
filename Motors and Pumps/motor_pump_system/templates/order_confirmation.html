<!DOCTYPE html><html lang="en"><head>    <meta charset="UTF-8">    <meta name="viewport" content="width=device-width, initial-scale=1.0">    <title>Order Confirmed — MotoParts</title>    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">    <link rel="stylesheet" href="static/css/style.css"></head><body>    <nav class="navbar navbar-expand-lg sticky-top">        <div class="container">            <a class="navbar-brand" href="index.html"><i class="fas fa-cogs"></i> Moto<span style="color: var(--accent-amber);">Parts</span></a>            <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"><i class="fas fa-bars"></i></button>            <div class="collapse navbar-collapse" id="navbarNav">                <ul class="navbar-nav mx-auto">                    <li class="nav-item"><a class="nav-link" href="index.html"><i class="fas fa-home"></i> Home</a></li>                    <li class="nav-item"><a class="nav-link" href="products.html"><i class="fas fa-box"></i> Products</a></li>                    <li class="nav-item"><a class="nav-link" href="dashboard.html"><i class="fas fa-tachometer-alt"></i> Dashboard</a></li>                    <li class="nav-item"><a class="nav-link" href="dashboard.html"><i class="fas fa-receipt"></i> My Orders</a></li>                </ul>                <div class="d-flex align-items-center gap-2">                    <a href="cart.html" class="btn btn-outline position-relative" style="padding:6px 12px"><i class="fas fa-shopping-cart"></i> <span class="cart-badge" style="display:none">0</span></a>                    <a href="#" class="btn btn-gold" style="font-size:0.78rem">Login</a>                </div>            </div>        </div>    </nav>    <div class="container py-4"><div class="row justify-content-center"><div class="col-lg-8"><div class="card text-center">        <div class="card-header" style="background:rgba(52,199,89,0.1);border-bottom:1px solid rgba(52,199,89,0.2)"><div style="width:72px;height:72px;border-radius:50%;background:rgba(52,199,89,0.15);display:inline-flex;align-items:center;justify-content:center;margin-bottom:12px"><i class="fas fa-check-circle fa-2x" style="color:#34c759"></i></div><h3 style="font-weight:700;color:#34c759;margin:0">Order Confirmed!</h3></div>        <div class="card-body" style="padding:32px"><h4 style="font-weight:600;margin-bottom:8px">Thank you for your order!</h4><p style="color:var(--text-secondary);font-size:1rem;margin-bottom:24px">Your order number is <strong style="color:var(--accent-amber)" id="orderId">#</strong></p><div id="orderDetails"></div><div class="d-flex justify-content-center gap-3 mt-4"><a id="trackLink" class="btn btn-primary"><i class="fas fa-truck me-2"></i>Track Order</a><a href="products.html" class="btn btn-secondary"><i class="fas fa-shopping-bag me-2"></i>Continue Shopping</a></div></div></div></div></div></div>    <footer style="background:#101018;border-top:1px solid var(--border-color);padding:30px 0;margin-top:40px"><div class="container text-center"><p style="color:var(--text-tertiary);font-size:0.8rem;margin:0">&copy; 2026 MotoParts. All rights reserved.</p></div></footer>    <script src="static/js/main.js"></script>    <script>    document.addEventListener('DOMContentLoaded', function() {        var params = new URLSearchParams(window.location.search);        var id = parseInt(params.get('id'), 10);        var order = MotoStore.getOrderById(id);        if (!order) { document.getElementById('orderDetails').innerHTML = '<p style="color:#ff453a">Order not found</p>'; return; }        document.getElementById('orderId').textContent = '#ORD-' + order.id;        document.getElementById('trackLink').href = 'order_detail.html?id=' + order.id;        var html = '<div style="background:var(--bg-card);border:1px solid var(--border-color);border-radius:var(--radius-md);padding:24px;text-align:left">' +            '<div class="row"><div class="col-md-6"><p style="color:var(--text-secondary);font-size:0.85rem;margin-bottom:8px"><strong style="color:var(--text-primary)">Order Date:</strong><br>' + MotoStore.formatDate(order.date) + '</p><p style="color:var(--text-secondary);font-size:0.85rem;margin-bottom:8px"><strong style="color:var(--text-primary)">Payment:</strong> Cash on Delivery</p><p style="color:var(--text-secondary);font-size:0.85rem;margin-bottom:0"><strong style="color:var(--text-primary)">Status:</strong> <span class="status-pending" style="display:inline-block;padding:4px 12px;border-radius:20px;font-size:0.75rem;font-weight:600;background:rgba(255,204,0,0.12);color:#ffd60a">' + order.status.toUpperCase() + '</span></p></div>' +            '<div class="col-md-6"><p style="color:var(--text-secondary);font-size:0.85rem;margin-bottom:8px"><strong style="color:var(--text-primary)">Delivery Address:</strong><br>' + order.address + '</p><p style="color:var(--text-secondary);font-size:0.85rem;margin-bottom:0"><strong style="color:var(--text-primary)">Total:</strong> <span style="color:var(--accent-amber);font-weight:700">' + MotoStore.formatINR(order.total) + '</span></p></div></div></div>';        document.getElementById('orderDetails').innerHTML = html;    });    </script></body></html>
