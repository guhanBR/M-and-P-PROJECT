<!DOCTYPE html><html lang="en"><head>    <meta charset="UTF-8">    <meta name="viewport" content="width=device-width, initial-scale=1.0">    <title>Product Details — MotoParts</title>    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">    <link rel="stylesheet" href="static/css/style.css"></head><body>    <nav class="navbar navbar-expand-lg sticky-top">        <div class="container">            <a class="navbar-brand" href="/"><i class="fas fa-cogs"></i> Moto<span style="color: var(--accent-amber);">Parts</span></a>            <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"><i class="fas fa-bars"></i></button>            <div class="collapse navbar-collapse" id="navbarNav">                <ul class="navbar-nav mx-auto">                    <li class="nav-item"><a class="nav-link" href="/"><i class="fas fa-home"></i> Home</a></li>                    <li class="nav-item"><a class="nav-link active" href="/products"><i class="fas fa-box"></i> Products</a></li>                    <li class="nav-item"><a class="nav-link" href="/dashboard"><i class="fas fa-tachometer-alt"></i> Dashboard</a></li>                    <li class="nav-item"><a class="nav-link" href="/dashboard"><i class="fas fa-receipt"></i> My Orders</a></li>                </ul>                <div class="d-flex align-items-center gap-2">                    <a href="/cart" class="btn btn-outline position-relative" style="padding:6px 12px"><i class="fas fa-shopping-cart"></i> <span class="cart-badge" style="display:none">0</span></a>                    <a href="#" class="btn btn-gold" style="font-size:0.78rem">Login</a>                </div>            </div>        </div>    </nav>    <div class="container py-4">        <nav aria-label="breadcrumb" class="mb-4"><ol class="breadcrumb"><li class="breadcrumb-item"><a href="/">Home</a></li><li class="breadcrumb-item"><a href="/products">Products</a></li><li class="breadcrumb-item active" id="breadcrumbCategory">Product</li></ol></nav>        <div class="row g-4" id="productContent">            <div class="col-md-6"><div class="card" style="overflow:hidden" id="productImageCard"></div></div>            <div class="col-md-6" id="productInfo"></div>        </div>        <div class="mt-4" id="productDesc"></div>    </div>    <footer style="background:#101018;border-top:1px solid var(--border-color);padding:30px 0;margin-top:40px"><div class="container text-center"><p style="color:var(--text-tertiary);font-size:0.8rem;margin:0">&copy; 2026 MotoParts. All rights reserved.</p></div></footer>    <script src="static/js/main.js"></script>    <script>    document.addEventListener('DOMContentLoaded', function() {        var match = window.location.pathname.match(/\/product\/(\d+)/);        var id = match ? parseInt(match[1], 10) : NaN;        var product = MotoStore.getProductById(id);        if (!product) { document.getElementById('productContent').innerHTML = '<div class="col-12"><div class="empty-state"><i class="fas fa-exclamation-triangle"></i><h4>Product not found</h4><a href="/products" class="btn btn-primary mt-3">Browse Products</a></div></div>'; return; }        document.title = product.name + ' — MotoParts';        document.getElementById('breadcrumbCategory').textContent = product.category;        var stockClass = product.stock === 0 ? 'badge bg-danger' : (product.stock <= 10 ? 'badge bg-warning text-dark' : 'badge bg-success');        var stockLabel = product.stock === 0 ? 'Out of Stock' : (product.stock <= 10 ? 'Low Stock (' + product.stock + ')' : 'In Stock (' + product.stock + ')');        document.getElementById('productImageCard').innerHTML = '<img src="' + product.image + '" class="d-block w-100 product-image" alt="' + product.name + '" onerror="this.src=\'https://placehold.co/600x400/1a1a2a/c4a86a?text=No+Image\'">';        document.getElementById('productInfo').innerHTML = '<h3 style="font-weight:700;margin-bottom:8px">' + product.name + '</h3>' +            '<p style="color:var(--text-tertiary);font-size:0.78rem;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:4px">' + product.part + '</p>' +            '<span class="category-badge mb-3 d-inline-block">' + product.category + '</span>' +            '<h2 class="product-price mt-3 mb-3">' + MotoStore.formatINR(product.price) + '</h2>' +            '<div class="' + stockClass + ' mb-3" style="display:inline-block;padding:6px 14px;border-radius:20px;font-size:0.75rem">' + stockLabel + '</div>' +            '<div style="margin-bottom:20px">' +            '<div class="d-flex justify-content-between py-2" style="border-bottom:1px solid var(--border-color)"><span style="color:var(--text-secondary);font-size:0.85rem"><i class="fas fa-industry me-2" style="color:var(--accent-amber)"></i>Brand</span><span style="font-weight:600;font-size:0.85rem">' + product.brand + '</span></div>' +            '<div class="d-flex justify-content-between py-2" style="border-bottom:1px solid var(--border-color)"><span style="color:var(--text-secondary);font-size:0.85rem"><i class="fas fa-cog me-2" style="color:var(--accent-amber)"></i>Compatible Model</span><span style="font-weight:600;font-size:0.85rem">' + product.model + '</span></div>' +            '<div class="d-flex justify-content-between py-2" style="border-bottom:1px solid var(--border-color)"><span style="color:var(--text-secondary);font-size:0.85rem"><i class="fas fa-bolt me-2" style="color:var(--accent-amber)"></i>Capacity</span><span style="font-weight:600;font-size:0.85rem">' + product.capacity + '</span></div>' +            '<div class="d-flex justify-content-between py-2" style="border-bottom:1px solid var(--border-color)"><span style="color:var(--text-secondary);font-size:0.85rem"><i class="fas fa-shield-alt me-2" style="color:var(--accent-amber)"></i>Warranty</span><span style="font-weight:600;font-size:0.85rem">' + product.warranty + '</span></div>' +            '<div class="d-flex justify-content-between py-2"><span style="color:var(--text-secondary);font-size:0.85rem"><i class="fas fa-cubes me-2" style="color:var(--accent-amber)"></i>Unit</span><span style="font-weight:600;font-size:0.85rem">' + product.unit + '</span></div>' +            '</div>' +            '<div class="d-flex align-items-center gap-3 mb-3">' +            '<label style="color:var(--text-secondary);font-size:0.85rem;font-weight:500">Qty:</label>' +            '<div class="d-flex align-items-center gap-2">' +            '<button class="btn btn-sm btn-secondary" onclick="changeQty(-1)" style="width:32px;height:32px;padding:0"><i class="fas fa-minus"></i></button>' +            '<input type="number" id="qtyInput" value="1" min="1" max="' + product.stock + '" style="width:60px;text-align:center;background:rgba(255,255,255,0.05);border:1px solid var(--border-color);border-radius:8px;color:var(--text-primary);padding:6px">' +            '<button class="btn btn-sm btn-secondary" onclick="changeQty(1)" style="width:32px;height:32px;padding:0"><i class="fas fa-plus"></i></button>' +            '</div></div>' +            '<div class="d-grid gap-2">' +            '<button class="btn btn-primary btn-lg" onclick="buyNow()" ' + (product.stock === 0 ? 'disabled' : '') + '><i class="fas fa-bolt me-2"></i>Buy Now</button>' +            '<button class="btn btn-secondary btn-lg" onclick="addAndCart()" ' + (product.stock === 0 ? 'disabled' : '') + '><i class="fas fa-cart-plus me-2"></i>Add to Cart</button>' +            '</div>';        document.getElementById('productDesc').innerHTML = '<div class="card"><div class="card-header"><h5 class="mb-0"><i class="fas fa-info-circle me-2" style="color:var(--accent-amber)"></i>Product Description</h5></div><div class="card-body"><p style="color:var(--text-secondary);line-height:1.8">' + product.desc + '</p></div></div>';        window.changeQty = function(d) { var inp = document.getElementById('qtyInput'); var v = parseInt(inp.value, 10) + d; if (v >= 1 && v <= product.stock) inp.value = v; };        window.addAndCart = function() { var q = parseInt(document.getElementById('qtyInput').value, 10); MotoStore.addToCart(product.id, q); updateNavCartBadge(); window.location.href = '/cart'; };        window.buyNow = function() { var q = parseInt(document.getElementById('qtyInput').value, 10); MotoStore.addToCart(product.id, q); updateNavCartBadge(); window.location.href = '/checkout'; };        updateNavCartBadge();    });    </script></body></html>
