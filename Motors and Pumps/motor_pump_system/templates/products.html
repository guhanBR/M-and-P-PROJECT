<!DOCTYPE html><html lang="en"><head>    <meta charset="UTF-8">    <meta name="viewport" content="width=device-width, initial-scale=1.0">    <title>Products — MotoParts</title>    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">    <link rel="stylesheet" href="static/css/style.css"></head><body>    <nav class="navbar navbar-expand-lg sticky-top">        <div class="container">            <a class="navbar-brand" href="/"><i class="fas fa-cogs"></i> Moto<span style="color: var(--accent-amber);">Parts</span></a>            <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" style="color: var(--text-primary);"><i class="fas fa-bars"></i></button>            <div class="collapse navbar-collapse" id="navbarNav">                <ul class="navbar-nav mx-auto">                    <li class="nav-item"><a class="nav-link" href="/"><i class="fas fa-home"></i> Home</a></li>                    <li class="nav-item"><a class="nav-link active" href="/products"><i class="fas fa-box"></i> Products</a></li>                    <li class="nav-item"><a class="nav-link" href="/dashboard"><i class="fas fa-tachometer-alt"></i> Dashboard</a></li>                    <li class="nav-item"><a class="nav-link" href="/dashboard"><i class="fas fa-receipt"></i> My Orders</a></li>                </ul>                <div class="d-flex align-items-center gap-2">                    <a href="/cart" class="btn btn-outline position-relative" style="padding:6px 12px">                        <i class="fas fa-shopping-cart"></i> <span class="cart-badge" style="display:none">0</span>                    </a>                    <a href="/auth/login" class="btn btn-gold" style="font-size:0.78rem">Login</a>                </div>            </div>        </div>    </nav>    <div class="container py-4">        <nav aria-label="breadcrumb" class="mb-4"><ol class="breadcrumb"><li class="breadcrumb-item"><a href="/">Home</a></li><li class="breadcrumb-item active">Products</li></ol></nav>        <div class="row">            <div class="col-md-3">                <div class="filter-section">                    <h5 class="mb-3">Filters</h5>                    <div class="mb-3"><label class="form-label">Search</label><input type="text" id="searchInput" class="form-control" placeholder="Search by name, part number or brand"></div>                    <div class="mb-3"><label class="form-label">Category</label><select id="categoryFilter" class="form-select"><option value="">All Categories</option></select></div>                    <div class="mb-3"><label class="form-label">Brand</label><select id="brandFilter" class="form-select"><option value="">All Brands</option></select></div>                    <div class="mb-3"><label class="form-label">Sort By</label><select id="sortFilter" class="form-select"><option value="">Default</option><option value="name-asc">Name A-Z</option><option value="name-desc">Name Z-A</option><option value="price-asc">Price Low to High</option><option value="price-desc">Price High to Low</option></select></div>                    <div class="mb-3"><div class="form-check"><input class="form-check-input" type="checkbox" id="inStock"><label class="form-label" for="inStock" style="margin-bottom:0">In Stock Only</label></div></div>                    <button class="btn btn-sm btn-outline-primary w-100" onclick="clearFilters()"><i class="fas fa-times me-1"></i>Clear Filters</button>                </div>            </div>            <div class="col-md-9">                <div class="d-flex justify-content-between align-items-center mb-3">                    <p class="mb-0" style="color:var(--text-secondary);font-size:0.85rem"><span id="resultCount">0</span> products found</p>                </div>                <div class="row g-3" id="productsGrid"></div>                <div class="empty-state" id="emptyState" style="display:none"><i class="fas fa-search"></i><h4>No products found</h4><p>Try adjusting your filters</p></div>                <div id="paginationWrap" class="d-flex justify-content-center mt-4" style="display:none !important"><div class="d-flex gap-2 align-items-center" id="pagination"></div></div>            </div>        </div>    </div>    <footer style="background:#101018;border-top:1px solid var(--border-color);padding:30px 0;margin-top:40px"><div class="container text-center"><p style="color:var(--text-tertiary);font-size:0.8rem;margin:0">&copy; 2026 MotoParts. All rights reserved.</p></div></footer>    <script src="static/js/main.js"></script>    <script>    document.addEventListener('DOMContentLoaded', function() {        var products = MotoStore.getActiveProducts();        var categories = MotoStore.getCategories();        var brands = MotoStore.getBrands();        var catSelect = document.getElementById('categoryFilter');        var brandSelect = document.getElementById('brandFilter');        var searchInput = document.getElementById('searchInput');        var sortFilter = document.getElementById('sortFilter');        var inStock = document.getElementById('inStock');        var grid = document.getElementById('productsGrid');        var emptyState = document.getElementById('emptyState');        var resultCount = document.getElementById('resultCount');        categories.forEach(function(c) { var o = document.createElement('option'); o.value = c.name; o.textContent = c.name; catSelect.appendChild(o); });        brands.forEach(function(b) { var o = document.createElement('option'); o.value = b; o.textContent = b; brandSelect.appendChild(o); });        function render(list) {            grid.innerHTML = '';            resultCount.textContent = list.length;            if (list.length === 0) { emptyState.style.display = 'block'; return; }            emptyState.style.display = 'none';            list.forEach(function(p) {                var stockClass = p.stock === 0 ? 'badge bg-danger' : (p.stock <= 10 ? 'badge bg-warning text-dark' : 'badge bg-success');                var stockLabel = p.stock === 0 ? 'Out of Stock' : (p.stock <= 10 ? 'Low Stock' : 'In Stock');                var col = document.createElement('div'); col.className = 'col-md-4 col-sm-6';                col.innerHTML = '<div class="product-card position-relative">' +                    '<a href="/product/' + p.id + '" style="text-decoration:none;color:inherit">' +                    '<img src="' + p.image + '" class="card-img-top" alt="' + p.name + '" onerror="this.src=\'https://placehold.co/400x300/1a1a2a/c4a86a?text=No+Image\'">' +                    '<div class="card-body">' +                    '<div class="part-number">' + p.part + '</div>' +                    '<h6 class="card-title">' + p.name + '</h6>' +                    '<span class="category-badge">' + p.category + '</span>' +                    '<div class="d-flex justify-content-between align-items-center mt-2">' +                    '<span class="product-price">' + MotoStore.formatINR(p.price) + '</span>' +                    '<span class="' + stockClass + '" style="font-size:0.65rem">' + stockLabel + '</span>' +                    '</div></div></a>' +                    '<div class="card-body pt-0">' +                    '<button class="btn btn-primary btn-sm w-100" onclick="addToCart(' + p.id + ')" ' + (p.stock === 0 ? 'disabled' : '') + '><i class="fas fa-cart-plus me-1"></i>Add to Cart</button>' +                    '</div></div>';                grid.appendChild(col);            });        }        function getFiltered() {            var q = searchInput.value.trim().toLowerCase();            var cat = catSelect.value;            var br = brandSelect.value;            var sort = sortFilter.value;            var stock = inStock.checked;            var list = products.filter(function(p) {                var mq = !q || p.name.toLowerCase().indexOf(q) !== -1 || p.part.toLowerCase().indexOf(q) !== -1 || p.brand.toLowerCase().indexOf(q) !== -1;                var mc = !cat || p.category === cat;                var mb = !br || p.brand === br;                var ms = !stock || p.stock > 0;                return mq && mc && mb && ms;            });            if (sort) { var parts = sort.split('-'); var key = parts[0]; var dir = parts[1]; list.sort(function(a,b) { var va = a[key]; var vb = b[key]; if (typeof va === 'string') { va = va.toLowerCase(); vb = vb.toLowerCase(); } return dir === 'asc' ? (va < vb ? -1 : 1) : (va > vb ? -1 : 1); }); }            return list;        }        function applyFilters() { render(getFiltered()); }        searchInput.addEventListener('input', applyFilters);        catSelect.addEventListener('change', applyFilters);        brandSelect.addEventListener('change', applyFilters);        sortFilter.addEventListener('change', applyFilters);        inStock.addEventListener('change', applyFilters);        window.clearFilters = function() { searchInput.value = ''; catSelect.value = ''; brandSelect.value = ''; sortFilter.value = ''; inStock.checked = false; applyFilters(); };        window.addToCart = function(id) { MotoStore.addToCart(id, 1); updateNavCartBadge(); alert('Added to cart!'); };        applyFilters();    });    </script></body></html>
