<!DOCTYPE html><html lang="en"><head>    <meta charset="UTF-8">    <meta name="viewport" content="width=device-width, initial-scale=1.0">    <title>Checkout — MotoParts</title>    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">    <link rel="stylesheet" href="static/css/style.css"></head><body>    <nav class="navbar navbar-expand-lg sticky-top">        <div class="container">            <a class="navbar-brand" href="/"><i class="fas fa-cogs"></i> Moto<span style="color: var(--accent-amber);">Parts</span></a>            <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"><i class="fas fa-bars"></i></button>            <div class="collapse navbar-collapse" id="navbarNav">                <ul class="navbar-nav mx-auto">                    <li class="nav-item"><a class="nav-link" href="/"><i class="fas fa-home"></i> Home</a></li>                    <li class="nav-item"><a class="nav-link" href="/products"><i class="fas fa-box"></i> Products</a></li>                    <li class="nav-item"><a class="nav-link" href="/dashboard"><i class="fas fa-tachometer-alt"></i> Dashboard</a></li>                    <li class="nav-item"><a class="nav-link" href="/dashboard"><i class="fas fa-receipt"></i> My Orders</a></li>                </ul>                <div class="d-flex align-items-center gap-2">                    <a href="/cart" class="btn btn-outline position-relative" style="padding:6px 12px"><i class="fas fa-shopping-cart"></i> <span class="cart-badge" style="display:none">0</span></a>                    <a href="/auth/login" class="btn btn-gold" style="font-size:0.78rem">Login</a>                </div>            </div>        </div>    </nav>    <div class="container py-4">        <div class="d-flex align-items-center gap-3 mb-4"><i class="fas fa-lock" style="color: var(--accent-amber); font-size: 1.5rem;"></i><h2 style="font-size: 1.4rem; font-weight: 700; margin: 0;">Checkout</h2></div>        <div class="row g-4">            <div class="col-lg-8">                <div class="card mb-4"><div class="card-header"><h5 class="mb-0"><i class="fas fa-truck me-2" style="color: var(--accent-amber);"></i>Shipping Information</h5></div><div class="card-body">                    <div class="mb-3"><label class="form-label">Full Name <span style="color:#ff453a">*</span></label><input type="text" id="custName" class="form-control" placeholder="Enter your full name"></div>                    <div class="mb-3"><label class="form-label">Phone Number <span style="color:#ff453a">*</span></label><input type="tel" id="custPhone" class="form-control" placeholder="Enter phone number"></div>                    <div class="mb-3"><label class="form-label">Email <span style="color:#ff453a">*</span></label><input type="email" id="custEmail" class="form-control" placeholder="Enter email address"></div>                    <div class="mb-3"><label class="form-label">Delivery Address <span style="color:#ff453a">*</span></label><textarea id="custAddress" class="form-control" rows="3" placeholder="Enter full delivery address"></textarea></div>                </div></div>                <div class="card"><div class="card-header"><h5 class="mb-0"><i class="fas fa-credit-card me-2" style="color: var(--accent-amber);"></i>Payment Method</h5></div><div class="card-body"><div class="form-check" style="background:rgba(212,168,83,0.06);border:1px solid rgba(212,168,83,0.15);border-radius:var(--radius-sm);padding:16px 20px"><input class="form-check-input" type="radio" name="payment" id="cod" value="cod" checked><label class="form-check-label" for="cod" style="margin-left:8px"><strong style="color:var(--accent-amber)">Cash on Delivery (COD)</strong><br><small style="color:var(--text-secondary)">Pay when your order arrives</small></label></div></div></div>            </div>            <div class="col-lg-4">                <div class="card" id="orderSummary"></div>            </div>        </div>    </div>    <footer style="background:#101018;border-top:1px solid var(--border-color);padding:30px 0;margin-top:40px"><div class="container text-center"><p style="color:var(--text-tertiary);font-size:0.8rem;margin:0">&copy; 2026 MotoParts. All rights reserved.</p></div></footer>    <script src="static/js/main.js"></script>    <script>    document.addEventListener('DOMContentLoaded', function() {        var user = MotoStore.getCurrentUser();        if (!user) { window.location.href = '/auth/login?next=/checkout'; return; }        document.getElementById('custName').value = user.username || '';        document.getElementById('custPhone').value = user.phone || '';        document.getElementById('custEmail').value = user.email || '';        document.getElementById('custAddress').value = user.address || '';        var cart = MotoStore.getCart();        var products = MotoStore.getProducts();        if (cart.length === 0) { window.location.href = '/products'; return; }        var items = []; var total = 0;        cart.forEach(function(item) {            for (var i = 0; i < products.length; i++) {                if (products[i].id === item.productId) {                    var sub = products[i].price * item.qty; total += sub;                    items.push({ product: products[i], qty: item.qty, subtotal: sub });                    break;                }            }        });        var summary = '<div class="card-header"><h5 class="mb-0"><i class="fas fa-receipt me-2" style="color:var(--accent-amber)"></i>Order Summary</h5></div><div class="card-body">';        items.forEach(function(it) {            summary += '<div class="d-flex justify-content-between mb-2"><div><span style="font-weight:500;font-size:0.85rem">' + it.product.name + '</span><br><small style="color:var(--text-tertiary)">Qty: ' + it.qty + ' \u00D7 ' + MotoStore.formatINR(it.product.price) + '</small></div><span style="font-weight:600;font-size:0.85rem">' + MotoStore.formatINR(it.subtotal) + '</span></div>';        });        summary += '<hr style="border-color:var(--border-color)">' +            '<div class="d-flex justify-content-between mb-2"><span style="color:var(--text-secondary)">Subtotal</span><span style="font-weight:600">' + MotoStore.formatINR(total) + '</span></div>' +            '<div class="d-flex justify-content-between mb-2"><span style="color:var(--text-secondary)">Shipping</span><span style="color:#34c759;font-weight:600">Free</span></div>' +            '<hr style="border-color:var(--border-color)">' +            '<div class="d-flex justify-content-between mb-3"><span style="font-weight:700">Total</span><span style="color:var(--accent-amber);font-size:1.1rem;font-weight:700">' + MotoStore.formatINR(total) + '</span></div>' +            '<div class="d-grid"><button class="btn btn-primary btn-lg" id="placeOrderBtn"><i class="fas fa-check me-2"></i>Place Order</button></div></div>';        document.getElementById('orderSummary').innerHTML = summary;        document.getElementById('placeOrderBtn').addEventListener('click', function() {            var name = document.getElementById('custName').value.trim();            var phone = document.getElementById('custPhone').value.trim();            var email = document.getElementById('custEmail').value.trim();            var address = document.getElementById('custAddress').value.trim();            if (!name) { alert('Please enter your name'); return; }            if (!phone) { alert('Please enter your phone number'); return; }            if (!email) { alert('Please enter your email'); return; }            if (!address) { alert('Please enter your delivery address'); return; }            var order = MotoStore.placeOrder({ name: name, phone: phone, email: email, address: address });            if (order) { window.location.href = '/order/confirmation/' + order.id; }        });    });    </script></body></html>
