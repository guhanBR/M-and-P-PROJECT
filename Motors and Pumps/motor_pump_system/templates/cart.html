<!DOCTYPE html><html lang="en"><head>    <meta charset="UTF-8">    <meta name="viewport" content="width=device-width, initial-scale=1.0">    <title>Shopping Cart — MotoParts</title>    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">    <link rel="stylesheet" href="static/css/style.css"></head><body>    <nav class="navbar navbar-expand-lg sticky-top">        <div class="container">            <a class="navbar-brand" href="/"><i class="fas fa-cogs"></i> Moto<span style="color: var(--accent-amber);">Parts</span></a>            <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"><i class="fas fa-bars"></i></button>            <div class="collapse navbar-collapse" id="navbarNav">                <ul class="navbar-nav mx-auto">                    <li class="nav-item"><a class="nav-link" href="/"><i class="fas fa-home"></i> Home</a></li>                    <li class="nav-item"><a class="nav-link" href="/products"><i class="fas fa-box"></i> Products</a></li>                    <li class="nav-item"><a class="nav-link" href="/dashboard"><i class="fas fa-tachometer-alt"></i> Dashboard</a></li>                    <li class="nav-item"><a class="nav-link" href="/dashboard"><i class="fas fa-receipt"></i> My Orders</a></li>                </ul>                <div class="d-flex align-items-center gap-2">                    <a href="/cart" class="btn btn-outline position-relative" style="padding:6px 12px"><i class="fas fa-shopping-cart"></i> <span class="cart-badge" style="display:none">0</span></a>                    <a href="#" class="btn btn-gold" style="font-size:0.78rem">Login</a>                </div>            </div>        </div>    </nav>    <div class="container py-4">        <div class="d-flex align-items-center gap-3 mb-4"><i class="fas fa-shopping-bag" style="color: var(--accent-amber); font-size: 1.5rem;"></i><h2 style="font-size: 1.4rem; font-weight: 700; margin: 0;">Shopping Cart</h2></div>        <div id="cartContent"></div>    </div>    <footer style="background:#101018;border-top:1px solid var(--border-color);padding:30px 0;margin-top:40px"><div class="container text-center"><p style="color:var(--text-tertiary);font-size:0.8rem;margin:0">&copy; 2026 MotoParts. All rights reserved.</p></div></footer>    <script src="static/js/main.js"></script>    <script>    document.addEventListener('DOMContentLoaded', function() { renderCart(); });    function renderCart() {        var content = document.getElementById('cartContent');        var cart = MotoStore.getCart();        var products = MotoStore.getProducts();        if (cart.length === 0) { content.innerHTML = '<div class="empty-state"><i class="fas fa-shopping-bag"></i><h4>Your cart is empty</h4><p>Start shopping to add items</p><a href="/products" class="btn btn-primary mt-3"><i class="fas fa-box me-2"></i>Browse Products</a></div>'; return; }        var items = []; var total = 0;        cart.forEach(function(item) {            for (var i = 0; i < products.length; i++) {                if (products[i].id === item.productId) {                    var sub = products[i].price * item.qty; total += sub;                    items.push({ product: products[i], qty: item.qty, subtotal: sub });                    break;                }            }        });        var rows = items.map(function(it) {            return '<div class="cart-item row align-items-center mx-0 px-3">' +                '<div class="col-md-2"><img src="' + it.product.image + '" class="img-fluid rounded" alt="' + it.product.name + '" style="max-height:80px;object-fit:cover" onerror="this.src=\'https://placehold.co/100x100/1a1a2a/c4a86a?text=No+Image\'"></div>' +                '<div class="col-md-3"><h5 style="font-size:0.95rem;font-weight:600;margin-bottom:4px">' + it.product.name + '</h5><p style="color:var(--text-tertiary);font-size:0.78rem;margin:0">' + it.product.part + '</p></div>' +                '<div class="col-md-2 text-center"><p style="color:var(--text-secondary);font-size:0.9rem;margin:0">' + MotoStore.formatINR(it.product.price) + '</p></div>' +                '<div class="col-md-2 text-center"><div class="d-flex align-items-center justify-content-center gap-2"><button class="btn btn-sm btn-secondary" onclick="updateQty(' + it.product.id + ',' + (it.qty - 1) + ')" style="width:28px;height:28px;padding:0"><i class="fas fa-minus" style="font-size:0.7rem"></i></button><span style="font-weight:600;min-width:24px;text-align:center">' + it.qty + '</span><button class="btn btn-sm btn-secondary" onclick="updateQty(' + it.product.id + ',' + (it.qty + 1) + ')" style="width:28px;height:28px;padding:0"><i class="fas fa-plus" style="font-size:0.7rem"></i></button></div></div>' +                '<div class="col-md-2 text-center"><p style="color:var(--accent-amber);font-weight:700;margin:0">' + MotoStore.formatINR(it.subtotal) + '</p></div>' +                '<div class="col-md-1 text-end"><button class="btn btn-sm" style="color:#ff453a" onclick="removeItem(' + it.product.id + ')"><i class="fas fa-trash"></i></button></div>' +                '</div>';        }).join('');        content.innerHTML = '<div class="row g-4"><div class="col-lg-8"><div class="card"><div class="card-body p-0">' + rows + '</div></div><a href="/products" class="btn btn-secondary mt-3"><i class="fas fa-arrow-left me-2"></i>Continue Shopping</a></div>' +            '<div class="col-lg-4"><div class="card"><div class="card-header"><h5 class="mb-0"><i class="fas fa-receipt me-2" style="color:var(--accent-amber)"></i>Order Summary</h5></div><div class="card-body">' +            '<div class="d-flex justify-content-between mb-2"><span style="color:var(--text-secondary)">Subtotal</span><span style="font-weight:600">' + MotoStore.formatINR(total) + '</span></div>' +            '<div class="d-flex justify-content-between mb-2"><span style="color:var(--text-secondary)">Shipping</span><span style="color:#34c759;font-weight:600">Free</span></div>' +            '<hr style="border-color:var(--border-color)">' +            '<div class="d-flex justify-content-between mb-3"><span style="font-weight:700;font-size:1.1rem">Total</span><span class="cart-total" style="color:var(--accent-amber);font-size:1.1rem;font-weight:700">' + MotoStore.formatINR(total) + '</span></div>' +            '<div class="d-grid gap-2"><a href="/checkout" class="btn btn-primary btn-lg"><i class="fas fa-lock me-2"></i>Proceed to Checkout</a></div></div></div></div></div>';    }    function updateQty(id, qty) { if (qty <= 0) { MotoStore.removeFromCart(id); } else { MotoStore.updateCartItem(id, qty); } renderCart(); updateNavCartBadge(); }    function removeItem(id) { if (confirm('Remove this item?')) { MotoStore.removeFromCart(id); renderCart(); updateNavCartBadge(); } }</script></body></html>
